<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>LINE LIFF Support Chat</title>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    :root {
      --line-green: #06c755;
      --line-green-deep: #03a44a;
      --line-bg: #8cc2d7;
      --chat-bg: #b4d5e3;
      --assistant: #ffffff;
      --user: #9cf962;
      --text: #1f2b35;
      --muted: #486170;
      --shadow: rgba(24, 47, 63, 0.14);
      --danger: #d63031;
      --warn: #ff9800;
      --daily: #0097a7;
      --normal: #7a8a97;
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }
    body {
      margin: 0;
      font-family: "Segoe UI", "Noto Sans", sans-serif;
      background:
        radial-gradient(1200px 700px at 100% 0%, #d4ecf8 0%, transparent 55%),
        linear-gradient(180deg, var(--line-bg), #8abed2);
      color: var(--text);
      display: grid;
      place-items: center;
      padding: 8px;
    }

    .phone {
      width: min(430px, 100%);
      height: min(900px, calc(100vh - 16px));
      border-radius: 24px;
      overflow: hidden;
      border: 1px solid rgba(255, 255, 255, 0.52);
      box-shadow: 0 22px 48px var(--shadow);
      display: grid;
      grid-template-rows: auto auto 1fr auto;
      background: var(--chat-bg);
    }

    .topbar {
      padding: 12px 14px;
      background: linear-gradient(135deg, var(--line-green), var(--line-green-deep));
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .room-title {
      font-size: 15px;
      font-weight: 800;
      letter-spacing: 0.2px;
      margin: 0;
    }

    .profile {
      font-size: 12px;
      opacity: 0.96;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 180px;
      text-align: right;
    }

    .statusbar {
      padding: 8px 12px;
      background: rgba(255, 255, 255, 0.66);
      border-bottom: 1px solid rgba(73, 106, 124, 0.18);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      font-size: 12px;
      color: var(--muted);
    }

    .risk-chip {
      border-radius: 999px;
      padding: 3px 10px;
      border: 1px solid rgba(63, 91, 105, 0.22);
      background: #fff;
      font-weight: 700;
      text-transform: lowercase;
    }
    .risk-normal { color: var(--normal); }
    .risk-daily { color: var(--daily); }
    .risk-warning { color: var(--warn); }
    .risk-crisis { color: var(--danger); }

    .messages {
      overflow-y: auto;
      padding: 14px 10px;
      display: grid;
      gap: 10px;
      align-content: start;
    }

    .msg-wrap {
      display: flex;
      width: 100%;
      gap: 8px;
    }
    .msg-wrap.assistant { justify-content: flex-start; }
    .msg-wrap.user { justify-content: flex-end; }

    .bubble {
      max-width: 82%;
      border-radius: 14px;
      padding: 9px 11px;
      line-height: 1.5;
      font-size: 14px;
      white-space: pre-wrap;
      animation: rise 140ms ease-out;
      box-shadow: 0 3px 8px rgba(22, 48, 65, 0.1);
    }

    .bubble.assistant {
      background: var(--assistant);
      border: 1px solid rgba(30, 54, 69, 0.12);
      border-top-left-radius: 5px;
    }
    .bubble.user {
      background: var(--user);
      border: 1px solid rgba(58, 121, 31, 0.22);
      border-top-right-radius: 5px;
    }

    .composer {
      background: #f5f9fb;
      border-top: 1px solid rgba(73, 106, 124, 0.2);
      padding: 8px;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 8px;
    }

    textarea {
      width: 100%;
      min-height: 56px;
      max-height: 128px;
      resize: none;
      border: 1px solid rgba(88, 120, 140, 0.35);
      border-radius: 10px;
      padding: 9px 10px;
      outline: none;
      font: inherit;
      background: #fff;
    }
    textarea:focus {
      border-color: #20b0ff;
      box-shadow: 0 0 0 3px rgba(32, 176, 255, 0.14);
    }

    button {
      border: 0;
      border-radius: 10px;
      min-width: 72px;
      padding: 0 12px;
      color: white;
      font-weight: 700;
      background: linear-gradient(135deg, var(--line-green), #02b14e);
      cursor: pointer;
    }
    button:disabled { opacity: 0.55; cursor: wait; }

    .hint {
      grid-column: 1 / -1;
      font-size: 11px;
      color: var(--muted);
      padding: 0 2px 2px;
    }

    @keyframes rise {
      from { transform: translateY(5px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
  </style>
</head>
<body>
  <main class="phone">
    <header class="topbar">
      <h1 class="room-title">&#x652F;&#x6301;&#x6027;&#x5C0D;&#x8A71;&#x5BA4;</h1>
      <div class="profile" id="profileText">&#x6B63;&#x5728;&#x521D;&#x59CB;&#x5316; LIFF...</div>
    </header>

    <section class="statusbar">
      <span id="statusText">&#x5C31;&#x7DD2;</span>
      <span class="risk-chip risk-normal" id="riskChip">normal</span>
    </section>

    <section class="messages" id="messages"></section>

    <section class="composer">
      <textarea id="inputBox" placeholder="&#x8ACB;&#x8F38;&#x5165;&#x4F60;&#x73FE;&#x5728;&#x7684;&#x611F;&#x53D7;&#x6216;&#x4ECA;&#x5929;&#x767C;&#x751F;&#x7684;&#x4E8B;&#x60C5;..."></textarea>
      <button id="sendBtn">&#x9001;&#x51FA;</button>
      <div class="hint">&#x6B64;&#x7CFB;&#x7D71;&#x70BA;&#x652F;&#x6301;&#x578B; AI&#xFF1B;&#x82E5;&#x6709;&#x7ACB;&#x5373;&#x5371;&#x96AA;&#x8ACB;&#x5148;&#x806F;&#x7D61; 110 / 119&#x3002;</div>
    </section>
  </main>

  <script>
    const LIFF_ID = "{{ liff_id }}";
    const profileText = document.getElementById("profileText");
    const statusText = document.getElementById("statusText");
    const riskChip = document.getElementById("riskChip");
    const messagesEl = document.getElementById("messages");
    const inputEl = document.getElementById("inputBox");
    const sendBtn = document.getElementById("sendBtn");
    const chatHistory = [];

    function setStatus(text) {
      statusText.textContent = text;
    }

    function setRisk(level) {
      const lv = level || "normal";
      riskChip.textContent = lv;
      riskChip.className = `risk-chip risk-${lv}`;
    }

    function addMessage(role, text) {
      const wrap = document.createElement("div");
      wrap.className = `msg-wrap ${role}`;

      const bubble = document.createElement("div");
      bubble.className = `bubble ${role}`;
      bubble.textContent = text;

      wrap.appendChild(bubble);
      messagesEl.appendChild(wrap);
      messagesEl.scrollTop = messagesEl.scrollHeight;
    }

    async function initLiff() {
      if (!LIFF_ID) {
        profileText.textContent = "LIFF_ID not configured";
        setStatus("\u672A\u8A2D\u5B9A LIFF_ID");
        addMessage("assistant", "\u5C1A\u672A\u8A2D\u5B9A LIFF_ID\uff0c\u8ACB\u5728 .env \u586B\u5165\u5F8C\u91CD\u555F\u3002");
        return;
      }
      try {
        await liff.init({ liffId: LIFF_ID });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        profileText.textContent = profile.displayName || "LINE user";
        setStatus("\u5DF2\u9023\u7DDA");
      } catch (error) {
        console.error(error);
        profileText.textContent = "LIFF failed";
        setStatus("LIFF \u521D\u59CB\u5316\u5931\u6557");
      }
    }

    async function sendMessage() {
      const text = inputEl.value.trim();
      if (!text) return;

      inputEl.value = "";
      addMessage("user", text);
      chatHistory.push({ role: "user", content: text });
      sendBtn.disabled = true;
      setStatus("AI \u56DE\u8986\u4E2D...");

      try {
        const resp = await fetch("/api/chat", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ messages: chatHistory })
        });
        const data = await resp.json();
        if (!resp.ok) throw new Error(data.error || "request failed");

        const reply = data.reply || "\u76EE\u524D\u6C92\u6709\u56DE\u8986\uff0c\u8ACB\u518D\u8A66\u4E00\u6B21\u3002";
        addMessage("assistant", reply);
        chatHistory.push({ role: "assistant", content: reply });
        setRisk(data.risk_level || "normal");
        setStatus("\u5DF2\u9023\u7DDA");
      } catch (error) {
        console.error(error);
        addMessage("assistant", "\u76EE\u524D\u7121\u6CD5\u9023\u5230\u6A21\u578B\u4F3A\u670D\u5668\uff0c\u8ACB\u7A0D\u5F8C\u518D\u8A66\u3002");
        setStatus("\u6A21\u578B\u9023\u7DDA\u7570\u5E38");
        setRisk("warning");
      } finally {
        sendBtn.disabled = false;
      }
    }

    sendBtn.addEventListener("click", sendMessage);
    inputEl.addEventListener("keydown", (event) => {
      if (event.key === "Enter" && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    addMessage(
      "assistant",
      "\u4F60\u597D\uff0c\u6211\u5728\u9019\u88E1\u966A\u4F60\u3002\u53EF\u4EE5\u5148\u5F9E\u4F60\u4ECA\u5929\u7684\u751F\u6D3B\u6216\u73FE\u5728\u7684\u611F\u53D7\u958B\u59CB\u8AAA\u8D77\u3002"
    );
    setRisk("normal");
    initLiff();
  </script>
</body>
</html>
